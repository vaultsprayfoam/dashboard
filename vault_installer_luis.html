<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Luis</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--red:#C8102E;--bg:#141414;--surface:#1E1E1E;--surface2:#252525;--border:rgba(255,255,255,0.08);--text:#F0EDE8;--muted:#888;--dim:#555;--green:#2ECC71;--amber:#E67E22;--blue:#2980B9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
header{background:#0f0f0f;border-bottom:3px solid var(--red);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:36px;width:auto;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;line-height:1;}
.logo-sub{font-size:9px;color:var(--red);letter-spacing:3px;text-transform:uppercase;font-weight:600;}
.badge{background:var(--red);border-radius:8px;padding:8px 16px;text-align:right;}
.badge-greeting{font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:0.85;}
.badge-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1;}
main{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
.tb-date{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;}
.tb-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.tb-pay{text-align:right;}
.tb-pay-label{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.tb-pay-amount{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--red);line-height:1;}
.sync-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;margin-bottom:16px;}
.sync-text{font-size:10px;color:var(--dim);}
.refresh-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;}
.refresh-btn:hover{color:var(--text);}
.tabs{display:flex;background:var(--surface);border-radius:10px 10px 0 0;overflow:hidden;margin-bottom:20px;}
.tab{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--dim);padding:13px;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.panel{display:none;}
.panel.active{display:block;}
.date-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:16px;}
.date-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;white-space:nowrap;}
.date-input{background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;outline:none;flex:1;}
.date-input::-webkit-calendar-picker-indicator{filter:invert(0.5);}
.today-btn{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;white-space:nowrap;}
.today-btn:hover{color:var(--text);}
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.jc-top{padding:16px 18px 14px;border-bottom:1px solid var(--border);}
.jc-num{font-size:9px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
.jc-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1.1;margin-bottom:8px;}
.jc-detail{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:4px;}
.jc-detail strong{color:var(--text);font-weight:500;}
.jc-svcs{padding:12px 18px;border-bottom:1px solid var(--border);}
.svcs-title{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.svc-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.svc-row:last-child{border-bottom:none;}
.svc-left{display:flex;align-items:center;gap:8px;}
.badge-oc6{background:rgba(200,16,46,0.12);color:#C8102E;border:1px solid rgba(200,16,46,0.35);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.badge-cc15{background:rgba(41,128,185,0.15);color:#5dade2;border:1px solid rgba(41,128,185,0.3);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.badge-oc4{background:rgba(230,126,34,0.15);color:#E67E22;border:1px solid rgba(230,126,34,0.3);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.badge-cc1{background:rgba(41,128,185,0.15);color:#5dade2;border:1px solid rgba(41,128,185,0.3);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.badge-vac{background:rgba(127,140,141,0.15);color:#95a5a6;border:1px solid rgba(127,140,141,0.3);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.badge-fg{background:rgba(39,174,96,0.15);color:#2ECC71;border:1px solid rgba(39,174,96,0.3);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:4px;}
.mine-tag{font-size:10px;color:var(--red);font-weight:600;}
.svc-budget{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);}
.jc-pay{padding:16px 18px;}
.pay-label{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:10px;}
.pay-box{background:var(--surface2);border-radius:10px;padding:14px 16px;border:1px solid var(--border);}
.pay-amount{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--red);line-height:1;}
.pay-sub{font-size:10px;color:var(--muted);margin-top:4px;}
.jc-notes{padding:10px 18px;font-size:11px;color:var(--muted);font-style:italic;}
.week-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.ws{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.ws-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);line-height:1;}
.ws-lbl{font-size:8px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:3px;}
.week-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.week-hdr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);}
.week-hdr-total{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--red);}
.week-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.wi-name{font-size:13px;font-weight:600;}
.wi-detail{font-size:10px;color:var(--muted);margin-top:2px;}
.wi-pay{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);}
.empty{text-align:center;padding:44px 20px;color:var(--dim);}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4;}
.empty-text{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.empty-sub{font-size:10px;margin-top:5px;opacity:0.6;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div style="width:36px;height:36px;background:var(--red);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:white;">V</div>

  </div>

    <div class="badge-greeting">Welcome back</div>
    <div class="badge-name">Luis</div>
  </div>

<main>
  <div class="top-bar">
    <div>
      <div class="tb-date" id="todayDisplay">—</div>
      <div class="tb-sub" id="weekDisplay">—</div>
    </div>

      <div class="tb-pay-label">My Week Pay</div>
      <div class="tb-pay-amount" id="weekPayDisplay">$0</div>

  </div>

      <div class="week-hdr-total" id="weekEarnings">$0</div>
    </div>
    <div id="weekContent"></div>

<script>
const MY_ID = 'luis';
const JT = {
  oc6:{short:'OC 6"',rate:0.30,spPct:0.55,hlPct:0.45,cls:'badge-oc6'},
  cc15:{short:'CC 1.5"+',rate:0.30,spPct:0.55,hlPct:0.45,cls:'badge-cc15'},
  oc4:{short:'OC 4" Wall',rate:0.25,spPct:0.55,hlPct:0.45,cls:'badge-oc4'},
  cc1:{short:'CC 1"',rate:0.25,spPct:0.55,hlPct:0.45,cls:'badge-cc1'},
  vac:{short:'Vacuum',rate:0.20,spPct:0.55,hlPct:0.45,cls:'badge-vac'},
  fg:{short:'Fiberglass',rate:0.25,spPct:0.55,hlPct:0.45,cls:'badge-fg'},
  misc:{short:'Misc',rate:1.00,spPct:0.55,hlPct:0.45,cls:'badge-misc'},
};
const MINS = {sprayer:200,helper:160};

function toStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtD(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtM(n){return '$'+Math.round(n||0).toLocaleString('en-US');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function weekRange(str){
  const d=new Date(str+'T00:00:00'),day=d.getDay();
  const s=new Date(d);s.setDate(d.getDate()-day);
  const e=new Date(s);e.setDate(s.getDate()+6);
  return{s,e};
}

function calcJobPay(job){
  const payMap={};
  const allDates=new Set();
  job.services.forEach(svc=>(svc.dayEntries||[]).forEach(de=>allDates.add(de.date)));
  allDates.forEach(date=>{
    const rawPay={};
    job.services.forEach(svc=>{
      const jt=JT[svc.typeKey];if(!jt)return;
      const svcEntries=svc.dayEntries||[];
      const dayEntry=svcEntries.find(de=>de.date===date);if(!dayEntry)return;
      const totalBudget=svc.sqft*jt.rate;
      const spD={},hlD={};let totSp=0,totHl=0;
      svcEntries.forEach(e=>(e.crew||[]).forEach(c=>{
        if(c.role==='sprayer'){totSp++;spD[c.installerId]=(spD[c.installerId]||0)+1;}
        else if(c.role==='helper'){totHl++;hlD[c.installerId]=(hlD[c.installerId]||0)+1;}
      }));
      const spBudget=totalBudget*jt.spPct,hlBudget=totalBudget*jt.hlPct;
      (dayEntry.crew||[]).forEach(c=>{
        const isSp=c.role==='sprayer';
        const days=isSp?spD[c.installerId]:hlD[c.installerId];
        const tot=isSp?totSp:totHl;
        const budget=isSp?spBudget:hlBudget;
        const raw=tot>0?(days/tot)*budget:0;
        if(!rawPay[c.installerId])rawPay[c.installerId]={pay:0,role:c.role};
        rawPay[c.installerId].pay+=raw;
        rawPay[c.installerId].role=c.role;
      });
    });
    Object.entries(rawPay).forEach(([id,{pay,role}])=>{
      const minPay=role==='sprayer'?200:160;
      if(!payMap[id])payMap[id]=0;
      payMap[id]+=Math.max(pay,minPay);
    });
  });
  const myBase=payMap[MY_ID]||0;
  const extras=(job.extras||[]).filter(e=>e.installerId===MY_ID).reduce((s,e)=>s+e.amount,0);
  return{total:myBase+extras,base:myBase,extras};
}

function calcDayPay(job,dateStr){
  // For display purposes - show their proportional share based on total job man-days
  // This is an estimate since final pay depends on total job completion
  return calcJobPay(job).total;
}

function amIOn(job,dateStr){
  const inSvc=(job.services||[]).some(svc=>(svc.dayEntries||[]).some(de=>de.date===dateStr&&(de.crew||[]).some(c=>c.installerId===MY_ID)));
  const inJob=(job.dayEntries||[]).some(de=>de.date===dateStr&&(de.crew||[]).some(c=>c.installerId===MY_ID));
  return inSvc||inJob;
}

let allJobs=[];
let todayStr='';

function renderToday(){
  const dateStr=document.getElementById('dateFilter').value||todayStr;
  const myJobs=allJobs.filter(j=>j.status==='open'&&amIOn(j,dateStr));
  const el=document.getElementById('todayContent');
  if(!myJobs.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">☀️</div><div class="empty-text">No jobs logged for this date</div><div class="empty-sub">Check back after Jonathan logs the schedule</div></div>';
    return;
  }
  el.innerHTML=myJobs.map((job,i)=>{
    const budget=(job.services||[]).reduce((s,svc)=>s+(JT[svc.typeKey]?svc.sqft*JT[svc.typeKey].rate:0),0)+((job.extras||[]).reduce((s,e)=>s+e.amount,0));
    const daysLogged=[...new Set((job.services||[]).flatMap(svc=>(svc.dayEntries||[]).map(d=>d.date)))].length;
    let myRole='installer';
    (job.services||[]).forEach(svc=>(svc.dayEntries||[]).forEach(de=>{if(de.date===dateStr){const m=(de.crew||[]).find(c=>c.installerId===MY_ID);if(m)myRole=m.role;}}));
    const svcsHtml=(job.services||[]).map(svc=>{
      const jt=JT[svc.typeKey];if(!jt)return'';
      const mine=(svc.dayEntries||[]).some(de=>de.date===dateStr&&(de.crew||[]).some(c=>c.installerId===MY_ID));
      return`<div class="svc-row" style="${mine?'':'opacity:0.4'}"><div class="svc-left"><span class="${jt.cls}">${jt.short}</span><span style="font-size:12px;color:var(--muted)">${(svc.sqft||0).toLocaleString()} sqft</span>${mine?'<span class="mine-tag">✓ YOUR SERVICE</span>':''}</div><span class="svc-budget">${fmtM(svc.sqft*jt.rate)}</span></div>`;
    }).join('');
    return`<div class="job-card">
      <div class="jc-top">
        <div class="jc-num">Job ${i+1}</div>
        <div class="jc-name">${esc(job.name)}</div>
        ${job.address?`<div class="jc-detail"><span>📍</span><strong>${esc(job.address)}</strong></div>`:''}
        ${job.jobDate?`<div class="jc-detail"><span>📅</span><strong>${fmtD(job.jobDate)}</strong></div>`:''}
        <div class="jc-detail"><span>🔧</span><span>${myRole.charAt(0).toUpperCase()+myRole.slice(1)} today</span></div>
      </div>
      <div class="jc-svcs"><div class="svcs-title">Job Services</div>${svcsHtml}</div>
      <div class="jc-pay">
        <div class="pay-label">Job Budget</div>
        <div class="pay-box">
          <div class="pay-amount">${fmtM(budget)}</div>
          <div class="pay-sub">Est. ${daysLogged} day${daysLogged!==1?'s':''} · See Week tab for your cut</div>
        </div>
      </div>
      ${job.notes?`<div class="jc-notes">📝 ${esc(job.notes)}</div>`:''}
    </div>`;
  }).join('');
}

function renderWeek(){
  const{s,e}=weekRange(todayStr);
  const ws=s.getTime(),we=e.getTime();
  const myWeekJobs=allJobs.filter(job=>(job.services||[]).some(svc=>(svc.dayEntries||[]).some(de=>{
    const ts=new Date(de.date+'T00:00:00').getTime();
    return ts>=ws&&ts<=we&&(de.crew||[]).some(c=>c.installerId===MY_ID);
  })));
  let total=0,days=0,extras=0;
  const html=myWeekJobs.length?myWeekJobs.map(job=>{
    const pay=calcJobPay(job);
    const d=(job.services||[]).reduce((s,svc)=>s+(svc.dayEntries||[]).filter(de=>(de.crew||[]).some(c=>c.installerId===MY_ID)).length,0);
    const ex=(job.extras||[]).filter(e=>e.installerId===MY_ID).reduce((s,e)=>s+e.amount,0);
    total+=pay;days+=d;extras+=ex;
    return`<div class="week-item"><div><div class="wi-name">${esc(job.name)}</div><div class="wi-detail">${d} day${d!==1?'s':''}${ex?` · ${fmtM(ex)} extra`:''}</div></div><div class="wi-pay">${fmtM(pay)}</div></div>`;
  }).join(''):'<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">No jobs this week</div><div class="empty-sub">Your earnings will appear here</div></div>';
  document.getElementById('weekContent').innerHTML=html;
  document.getElementById('weekEarnings').textContent=fmtM(total);
  document.getElementById('statJobs').textContent=myWeekJobs.length;
  document.getElementById('statDays').textContent=days;
  document.getElementById('statExtras').textContent=extras?fmtM(extras):'$0';
  document.getElementById('weekPayDisplay').textContent=fmtM(total);
}

function resetToday(){
  document.getElementById('dateFilter').value=todayStr;
  renderToday();
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

// Init
const now=new Date();
todayStr=toStr(now);
document.getElementById('todayDisplay').textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
const{s,e}=weekRange(todayStr);
document.getElementById('weekDisplay').textContent='Week of '+fmtD(toStr(s))+' – '+fmtD(toStr(e));
document.getElementById('dateFilter').value=todayStr;

// Firebase
const firebaseConfig={
  apiKey:"AIzaSyC0YkRWj2fEJSrEAfsSRJMxPri6QImSAT0",
  authDomain:"vault-spray-foam.firebaseapp.com",
  databaseURL:"https://vault-spray-foam-default-rtdb.firebaseio.com",
  projectId:"vault-spray-foam",
  storageBucket:"vault-spray-foam.firebasestorage.app",
  messagingSenderId:"664365786455",
  appId:"1:664365786455:web:0958942e3747caeec0ca12"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
db.ref('vault_ops').on('value',snap=>{
  const data=snap.val();
  document.getElementById('syncStatus').innerHTML='<span style="color:#2ECC71">● live</span>';
  if(data&&data.jobs){
    allJobs=data.jobs;
    renderToday();
    renderWeek();
  } else {
    allJobs=[];
    renderToday();
    renderWeek();
  }
});
</script>

        renderToday(tf ? tf.value || todayStr : todayStr);
        renderWeek();
      }
    });
  </script>
